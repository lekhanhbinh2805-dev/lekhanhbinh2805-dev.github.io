<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra nhiệt độ mũi hàn</title>
    <style>
        /* Giao diện tổng thể */
        body { 
            background-color: #00befa; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0;
        }

        .form-container { 
            background-color: white; 
            padding: 30px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }

        h2 { 
            text-align: center; 
            text-transform: uppercase; 
            font-weight: bold; 
            margin-bottom: 25px; 
            color: #333; 
            font-size: 22px;
        }

        /* Group các ô nhập liệu */
        .form-group { margin-bottom: 15px; }

        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 5px; 
            font-size: 13px; 
            color: #444; 
        }

        input[type="text"], 
        input[type="number"], 
        select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px;
            outline: none;
        }

        input:focus { border-color: #5bb1f9; box-shadow: 0 0 5px rgba(91,177,249,0.3); }

        /* Radio buttons */
        .radio-group { display: flex; gap: 20px; padding: 10px 0; }
        .radio-item { display: flex; align-items: center; gap: 5px; cursor: pointer; }

        /* Khu vực nút bấm */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .row-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-submit {
            width: 100%;
            background-color: #007bff;
            color: white;
            padding: 15px;
            font-size: 16px;
        }

        .btn-submit:hover { background-color: #0056b3; transform: translateY(-1px); }

        .btn-reset {
            flex: 1;
            background-color: #dc3545;
            color: white;
            padding: 12px;
        }

        .btn-reset:hover { background-color: #a71d2a; }

        .btn-back {
            flex: 1;
            background-color: #6c757d;
            color: white;
            padding: 12px;
        }

        .btn-back:hover { background-color: #545b62; }

        button:disabled {
            background-color: #ccc !important;
            cursor: not-allowed;
            transform: none !important;
        }

    </style>
</head>
<body>

<div class="form-container">
    <h2>KIỂM TRA NHIỆT ĐỘ MŨI HÀN</h2>
    
    <form id="tempForm">
        <!-- Bộ phận -->
        <div class="form-group">
            <label>BỘ PHẬN SỬ DỤNG</label>
            <select name="boPhan" required>
                <option value="">-- Chọn bộ phận --</option>
                <option value="GCBM">GCBM</option>
                <option value="LR">Lắp ráp</option>
                <option value="KĐ3P">KĐ3P</option>
                <option value="KĐ1P">KĐ1P</option>
                <option value="KTSX">KTSX</option>
            </select>
        </div>

        <!-- Người thực hiện -->
        <div class="form-group">
            <label>NGƯỜI THỰC HIỆN</label>
            <input type="text" name="nguoiThucHien" placeholder="Nhập tên người kiểm tra" required>
        </div>

        <!-- Mã máy -->
        <div class="form-group">
            <label>MÃ MÁY HÀN</label>
            <input type="text" name="maMay" placeholder="VD: 001, 002..." required>
        </div>

        <!-- Loại kiểm tra -->
        <div class="form-group">
            <label>LOẠI KIỂM TRA</label>
            <div class="radio-group">
                <label class="radio-item">
                    <input type="radio" name="loaiKiemTra" value="Định kỳ" required> Định kỳ
                </label>
                <label class="radio-item">
                    <input type="radio" name="loaiKiemTra" value="Sửa chữa"> Sửa chữa
                </label>
            </div>
        </div>

        <!-- Nhiệt độ cài đặt -->
        <div class="form-group">
            <label>NHIỆT ĐỘ CÀI ĐẶT (°C)</label>
            <input type="number" name="nhietDoCaiDat" placeholder="0" required>
        </div>

        <!-- Nhiệt độ thực tế -->
        <div class="form-group">
            <label>NHIỆT ĐỘ THỰC TẾ (°C)</label>
            <input type="number" name="nhietDoThucTe" placeholder="0" required>
        </div>

        <!-- Ghi chú -->
        <div class="form-group">
            <label>GHI CHÚ</label>
            <input type="text" name="ghiChu" placeholder="Nếu có...">
        </div>

        <!-- Nhóm nút bấm -->
        <div class="button-stack">
            <!-- Nút gửi chính -->
            <button type="submit" id="submitBtn" class="btn-submit">GỬI DỮ LIỆU</button>
            
            <div class="row-buttons">
                <!-- Nút Xóa dữ liệu -->
                <button type="button" class="btn-reset" onclick="resetForm()">XÓA NHẬP LẠI</button>
                
                <!-- Nút Quay về -->
                <!-- Thay 'index.html' bằng file bạn muốn quay về -->
                <button type="button" class="btn-back" onclick="goToMenu()">QUAY VỀ MENU</button>
            </div>
        </div>
    </form>
</div>

<script>
    const form = document.getElementById('tempForm');
    const btn = document.getElementById('submitBtn');

    // Hàm xử lý khi gửi form
    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // if(!confirm("Xác nhận gửi dữ liệu này lên hệ thống?")) return;

        btn.disabled = true;
        btn.innerText = "Đang gửi...";

        // Link Google Apps Script của bạn
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbyHYFECD56GBd16fKWwObIwoZJ_n4qSwM3lg4a-W8LEpThVYmvNRXsCIwseQo73WhUHfw/exec';

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors', 
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            alert("Gửi dữ liệu thành công!");
            form.reset();
        })
        .catch(error => {
            console.error('Lỗi:', error);
            alert("Lỗi kết nối! Vui lòng thử lại.");
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "GỬI DỮ LIỆU";
        });
    });

    // Hàm xóa dữ liệu các ô
    function resetForm() {
        if (confirm("Bạn có muốn xóa toàn bộ thông tin đã nhập không?")) {
            form.reset();
        }
    }

    // Hàm chuyển trang quay về
    function goToMenu() {
        // Thay đường dẫn file của bạn vào đây
        window.location.href = 'index.html'; 
    }
</script>

</body>
</html>
