<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra nhiệt độ mũi hàn</title>
    <style>
        /* Giao diện tổng thể */
        body { 
            background-color: #f4f7f6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0;
        }

        .form-container { 
            background-color: white; 
            padding: 30px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 600px; /* Tăng nhẹ chiều rộng để nhãn nằm ngang thoải mái */
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        h2 { 
            text-align: center; 
            text-transform: uppercase; 
            font-weight: bold; 
            margin-bottom: 25px; 
            color: #2c3e50; 
            font-size: 20px;
            border-bottom: 2px solid #e74c3c;
            padding-bottom: 10px;
        }

        /* Group các ô nhập liệu - Căn ngang */
        .form-group { 
            display: flex;
            align-items: center;
            margin-bottom: 15px; 
        }

        label { 
            flex: 0 0 160px; /* Độ rộng cố định cho nhãn */
            font-weight: 600; 
            font-size: 13px; 
            color: #444; 
            padding-right: 15px;
        }

        input[type="text"], 
        input[type="number"], 
        select { 
            flex: 1; /* Chiếm không gian còn lại */
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: #007bff; box-shadow: 0 0 5px rgba(0,123,255,0.2); }

        /* Radio buttons */
        .radio-group { 
            flex: 1;
            display: flex; 
            gap: 20px; 
        }
        .radio-item { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            cursor: pointer; 
            font-size: 14px;
            flex: none; /* Reset lại flex cho label con trong radio */
        }

        /* Khu vực nút bấm */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 25px;
        }

        .row-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-submit {
            width: 100%;
            background-color: #27ae60;
            color: white;
            padding: 15px;
            font-size: 16px;
        }

        .btn-submit:hover { background-color: #219150; }

        .btn-reset {
            flex: 1;
            background-color: #e74c3c;
            color: white;
            padding: 12px;
        }

        .btn-back {
            flex: 1;
            background-color: #95a5a6;
            color: white;
            padding: 12px;
        }

        button:disabled {
            background-color: #ccc !important;
            cursor: not-allowed;
        }

        /* Responsive: Dưới 480px sẽ tự động nhảy thành hàng dọc */
        @media (max-width: 480px) {
            .form-group {
                flex-direction: column;
                align-items: flex-start;
            }
            label {
                flex: none;
                margin-bottom: 5px;
                padding-right: 0;
            }
            input, select, .radio-group {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>KIỂM TRA NHIỆT ĐỘ MŨI HÀN</h2>
    
    <form id="tempForm">
        <!-- Bộ phận -->
        <div class="form-group">
            <label>BỘ PHẬN SỬ DỤNG</label>
            <select name="boPhan" required>
                <option value="">-- Chọn bộ phận --</option>
                <option value="GCBM">GCBM</option>
                <option value="LR">Lắp ráp</option>
                <option value="KĐ3P">KĐ3P</option>
                <option value="KĐ1P">KĐ1P</option>
                <option value="KTSX">KTSX</option>
            </select>
        </div>

        <!-- Người thực hiện -->
        <div class="form-group">
            <label>NGƯỜI THỰC HIỆN</label>
            <input type="text" name="nguoiThucHien" placeholder="Nhập tên người kiểm tra" required>
        </div>

        <!-- Mã máy -->
        <div class="form-group">
            <label>MÃ MÁY HÀN</label>
            <input type="number" name="maMayHan" min="0" inputmode="numeric" placeholder="VD: 001, 002..." required>
        </div>

        <!-- Loại kiểm tra -->
        <div class="form-group">
            <label>LOẠI KIỂM TRA</label>
            <div class="radio-group">
                <label class="radio-item">
                    <input type="radio" name="loaiKiemTra" value="Định kỳ" required> Định kỳ
                </label>
                <label class="radio-item">
                    <input type="radio" name="loaiKiemTra" value="Sửa chữa"> Sửa chữa
                </label>
            </div>
        </div>

        <!-- Nhiệt độ cài đặt -->
        <div class="form-group">
            <label>NHIỆT ĐỘ CÀI ĐẶT (°C)</label>
            <input type="number" name="nhietDoCaiDat" min="0" inputmode="numeric" placeholder="Hiển thị trên LCD /Núm chỉnh nhiệt độ máy hàn" required>
        </div>

        <!-- Nhiệt độ thực tế -->
        <div class="form-group">
            <label>NHIỆT ĐỘ THỰC TẾ (°C)</label>
            <input type="number" name="nhietDoThucTe" inputmode="numeric" placeholder="Hiển thị trên máy đo nhiệt độ" required>
        </div>

        <!-- Ghi chú -->
        <div class="form-group">
            <label>GHI CHÚ</label>
            <input type="text" name="ghiChu" placeholder="Nếu có...">
        </div>

        <!-- Nhóm nút bấm -->
        <div class="button-stack">
            <!-- Nút gửi chính -->
            <button type="submit" id="submitBtn" class="btn-submit">GỬI DỮ LIỆU</button>
            
            <div class="row-buttons">
                <!-- Nút Xóa dữ liệu -->
                <button type="button" class="btn-reset" onclick="resetForm()">XÓA NHẬP LẠI</button>
                
                <!-- Nút Quay về -->
                <!-- Thay 'index.html' bằng file bạn muốn quay về -->
                <button type="button" class="btn-back" onclick="goToMenu()">QUAY VỀ MENU</button>
            </div>
        </div>
    </form>
</div>

<script src="script-nhiet-do-mui-han.js"></script>

    <script>
        const form = document.getElementById('tempForm');
        const btn = document.getElementById('submitBtn');

        // Xử lý sự kiện gửi form
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            btn.disabled = true;
            btn.innerText = "Đang gửi...";

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                // Gọi hàm từ file script.js đã tách
                await sendDataToGoogleSheet(data);
                
                alert("Gửi dữ liệu thành công!");
                form.reset();
            } catch (error) {
                console.error('Lỗi:', error);
                alert("Lỗi kết nối! Vui lòng thử lại.");
            } finally {
                btn.disabled = false;
                btn.innerText = "GỬI DỮ LIỆU";
            }
        });
    </script>
</body>
</html>
