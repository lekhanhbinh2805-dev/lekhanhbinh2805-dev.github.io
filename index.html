<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Kiểm Tra Sản Xuất</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
        }

        /* Container chuyển sang chiều dọc */
        .container {
            display: flex;
            flex-direction: column; /* Xếp hàng dọc */
            gap: 15px; /* Khoảng cách giữa các nút */
            width: 300px; /* Độ rộng cố định cho các nút bằng nhau */
            background-color: white;
            padding: 30px;
            border-radius: 15px; width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }

        .btn {
            padding: 18px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            color: white;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center; /* Căn chữ giữa nút */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Màu sắc */
        .btn-temp { background-color: #d32f2f; }
        .btn-force { background-color: #1976d2; }
        .btn-sample { background-color: #388e3c; }

        /* Hiệu ứng hover */
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <h2>DANH MỤC KIỂM TRA</h2>

    <div class="container">
        <a href="kiem-tra-nhiet-do.html" class="btn btn-temp">
            Kiểm tra nhiệt độ mũi hàn
        </a>

        <a href="kiem-tra-luc-vit.html" class="btn btn-force">
            Kiểm tra lực vít máy
        </a>

        <a href="lay-mau-ban-thanh-pham.html" class="btn btn-sample">
            Lấy mẫu bán thành phẩm
        </a>
    </div>

</body>
</html>
