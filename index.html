<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #00befa;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .form-container {
      background-color: white;
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      text-transform: uppercase;
      font-weight: bold;
      margin-bottom: 25px;
    }
    .form-group { margin-bottom: 15px; }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      text-transform: uppercase;
      font-size: 14px;
    }
    input[type="text"], select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }
    .radio-group {
      display: flex;
      gap: 20px;
      align-items: center;
      padding: 5px 0;
    }
    .radio-item { display: flex; align-items: center; gap: 5px; }
    .required { color: red; }
    button {
      width: 100%;
      background-color: #5bb1f9;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }
    button:hover { background-color: #4696e2; }
  </style>
</head>
<body>

<div class="form-container">
  <h2>KIỂM TRA NHIỆT ĐỘ MŨI HÀN</h2>
  
  <form id="tempForm" onsubmit="handleFormSubmit(this)">
    <div class="form-group">
      <label>BỘ PHẬN SỬ DỤNG</label>
      <select name="boPhan" required>
        <option value="">-- Chọn bộ phận --</option>
        <option value="Sản xuất">Sản xuất</option>
        <option value="Kỹ thuật">Kỹ thuật</option>
        <option value="QA">QA</option>
      </select>
    </div>

    <div class="form-group">
      <label>NGƯỜI THỰC HIỆN</label>
      <input type="text" name="nguoiThucHien" required>
    </div>

    <div class="form-group">
      <label>MÃ MÁY</label>
      <input type="text" name="maMay" placeholder="Nhập mã máy (VD: 001)" required>
    </div>

    <div class="form-group">
      <label>LOẠI KIỂM TRA <span class="required">*</span></label>
      <div class="radio-group">
        <div class="radio-item">
          <input type="radio" id="dinhky" name="loaiKiemTra" value="Định kỳ" required>
          <label for="dinhky" style="text-transform: none; margin:0;">Định kỳ</label>
        </div>
        <div class="radio-item">
          <input type="radio" id="suachua" name="loaiKiemTra" value="Sửa chữa">
          <label for="suachua" style="text-transform: none; margin:0;">Sửa chữa</label>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>NHIỆT ĐỘ CÀI ĐẶT</label>
      <input type="text" name="nhietDoCaiDat" required>
    </div>

    <div class="form-group">
      <label>NHIỆT ĐỘ THỰC TẾ</label>
      <input type="text" name="nhietDoThucTe" required>
    </div>

    <div class="form-group">
      <label>GHI CHÚ</label>
      <input type="text" name="ghiChu">
    </div>

    <button type="submit" id="submitBtn">Gửi dữ liệu</button>
  </form>
</div>

<script>
  function handleFormSubmit(formObject) {
    event.preventDefault();
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').innerHTML = "Đang gửi...";
    
    google.script.run
      .withSuccessHandler(function(msg) {
        alert(msg);
        document.getElementById("tempForm").reset();
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').innerHTML = "Gửi dữ liệu";
      })
      .processForm(formObject);
  }
</script>

</body>
</html>
