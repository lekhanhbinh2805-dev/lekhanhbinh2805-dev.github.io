<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Nhập nhiệt độ máy hàn</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}
input, select, button {
  width:100%;
  margin-top:10px;
  padding:10px;
}
button {
  background:#4facfe;
  color:white;
  border:none;
}
</style>
</head>

<body>
<div class="box">
<h3>Nhập nhiệt độ</h3>

<select id="maMay">
  <option value="">--Chọn máy--</option>
  <option>M1</option>
  <option>M2</option>
  <option>M3</option>
</select>

<input type="number" id="nhietDo" placeholder="Nhập nhiệt độ">

<button onclick="gui()">Gửi</button>

<p id="msg"></p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzBnd8Cgn95aHidz_SgAZO6kRqZEsAKySJhqY1mB-HmKzG-PkHY9xQGYAL2ZW_R7y_iQg/exec";

function gui() {
  const maMay = document.getElementById("maMay").value;
  const nhietDo = document.getElementById("nhietDo").value;

  if(!maMay || !nhietDo){
    document.getElementById("msg").innerText = "Nhập đủ dữ liệu!";
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      maMay: maMay,
      nhietDo: nhietDo
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("msg").innerText = "Đã gửi!";
  })
  .catch(err => {
    document.getElementById("msg").innerText = "Lỗi gửi!";
  });
}
</script>

</body>
</html>
