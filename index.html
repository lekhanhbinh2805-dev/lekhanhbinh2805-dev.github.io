<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIỂM TRA NHIỆT ĐỘ MŨI HÀN</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 350px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 8px 0 15px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #00c6ff;
    }

    .message {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>KIỂM TRA NHIỆT ĐỘ MŨI HÀN</h2>

  <label>BỘ PHẬN SỬ DỤNG</label>
  <select id="maBP">
    <option value="">-- Chọn bộ phận --</option>
    <option value="GCBM">GCBM</option>
    <option value="LR">LR</option>
    <option value="KD3P">KD3P</option>
    <option value="KD1P">KD1P</option>
    <option value="KTSX">KTSX</option>
  </select>

  <label>MÃ MÁY</label>
  <input type="number" id="maMay" placeholder="Nhập mã máy (VD: 001)">

  <button onclick="guiDuLieu()">Gửi dữ liệu</button>

  <div class="message" id="msg"></div>
</div>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycbyibTfkX8T1YnGuJjhc6TGryFQp751oet0dUFJjm4mr4osdO1Ket2P6x0qu-lZjljQTZg/exec";

function guiDuLieu() {
  const maBP = document.getElementById("maBP").value;
  const maMay = document.getElementById("maMay").value;
  const msg = document.getElementById("msg");

  // Validation
  if (!maBP) {
    msg.innerText = "Vui lòng chọn bộ phận";
    msg.style.color = "red";
    return;
  }

  if (!maMay || maMay < 0 || maMay > 500) {
    msg.innerText = "Nhiệt độ không hợp lệ (0-500°C)";
    msg.style.color = "red";
    return;
  }

  const data = {
    maBP: maBP,
    maMay: maMay
  };

  fetch(URL_API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    msg.innerText = "Lưu thành công";
    msg.style.color = "green";

    document.getElementById("maMay").value = "";
    document.getElementById("maBP").value = "";
  })
  .catch(() => {
    msg.innerText = "Lỗi gửi dữ liệu";
    msg.style.color = "red";
  });
}
</script>

</body>
</html>
