<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra nhiệt độ mũi hàn</title>
    <style>
        body { background-color: #00befa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .form-container { background-color: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        h2 { text-align: center; text-transform: uppercase; font-weight: bold; margin-bottom: 25px; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; font-size: 13px; color: #444; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .radio-group { display: flex; gap: 20px; padding: 10px 0; }
        .radio-item { display: flex; align-items: center; gap: 5px; }
        .required { color: red; }
        button { width: 100%; background-color: #5bb1f9; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #3b9deb; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>KIỂM TRA NHIỆT ĐỘ MŨI HÀN</h2>
    <form id="tempForm">
        <div class="form-group">
            <label>BỘ PHẬN SỬ DỤNG</label>
            <select name="boPhan" required>
                <option value="">-- Chọn bộ phận --</option>
                <option value="GCBM">GCBM</option>
                <option value="LR">Lắp ráp</option>
                <option value="KĐ3P">KĐ3P</option>
                <option value="KĐ1P">KĐ1P</option>
                <option value="KTSX">KTSX</option>
            </select>
        </div>

        <div class="form-group">
            <label>NGƯỜI THỰC HIỆN</label>
            <input type="text" name="nguoiThucHien" required>
        </div>

        <div class="form-group">
            <label>MÃ MÁY</label>
            <input type="text" name="maMay" placeholder="Nhập mã máy (VD: 001)" required>
        </div>

        <div class="form-group">
            <label>LOẠI KIỂM TRA</label>
            <div class="radio-group">
                <div class="radio-item">
                    <input type="radio" id="dinhky" name="loaiKiemTra" value="Định kỳ" required>
                    <label for="dinhky" style="text-transform: none; margin:0;">Định kỳ</label>
                </div>
                <div class="radio-item">
                    <input type="radio" id="suachua" name="loaiKiemTra" value="Sửa chữa">
                    <label for="suachua" style="text-transform: none; margin:0;">Sửa chữa</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>NHIỆT ĐỘ CÀI ĐẶT</label>
            <input type="number" name="nhietDoCaiDat" required>
        </div>

        <div class="form-group">
            <label>NHIỆT ĐỘ THỰC TẾ</label>
            <input type="number" name="nhietDoThucTe" required>
        </div>

        <div class="form-group">
            <label>GHI CHÚ</label>
            <input type="text" name="ghiChu">
        </div>

        <button type="submit" id="submitBtn">GỬI DỮ LIỆU</button>
    </form>
</div>

<script>
    const form = document.getElementById('tempForm');
    const btn = document.getElementById('submitBtn');

    // ĐOẠN CODE KẾT NỐI CHÍNH
    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "ĐANG GỬI...";

        // THAY LINK WEB APP CỦA BẠN VÀO ĐÂY
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbzkjs1O87GK_zaXikHamh_fECHhkvx_nPXT_ISLIqOf6R1feZLJ_RgVeb_0yJaUtbw5IQ/exec';

        // Lấy dữ liệu từ form
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // Gửi dữ liệu bằng Fetch API (kết nối với Google Sheets)
        fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors', // Quan trọng để tránh lỗi CORS
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            alert("Gửi dữ liệu lên Google Sheet thành công!");
            form.reset();
            btn.disabled = false;
            btn.innerText = "GỬI DỮ LIỆU";
        })
        .catch(error => {
            console.error('Lỗi:', error);
            alert("Có lỗi xảy ra khi gửi dữ liệu.");
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
