<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Kiểm Tra Sản Xuất</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            color: white;
            transition: transform 0.2s, background-color 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        /* Màu sắc riêng cho từng nút */
        .btn-temp { background-color: #e74c3c; } /* Đỏ */
        .btn-force { background-color: #3498db; } /* Xanh dương */
        .btn-sample { background-color: #27ae60; } /* Xanh lá */

        /* Hiệu ứng khi di chuột vào */
        .btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h2>HỆ THỐNG KIỂM TRA SẢN XUẤT</h2>

    <div class="container">
        <!-- Nút 1 -->
        <a href="kiem-tra-nhiet-do.html">
            <button class="btn btn-temp">Kiểm tra nhiệt độ mũi hàn</button>
        </a>

        <!-- Nút 2 -->
        <a href="kiem-tra-luc-vit.html">
            <button class="btn btn-force">Kiểm tra lực vít máy</button>
        </a>

        <!-- Nút 3 -->
        <a href="lay-mau-ban-thanh-pham.html">
            <button class="btn btn-sample">Lấy mẫu bán thành phẩm</button>
        </a>
    </div>

</body>
</html>
