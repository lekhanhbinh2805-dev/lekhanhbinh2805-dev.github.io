<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lấy mẫu bán thành phẩm</title>
    <style>
        /* Giao diện tổng thể */
        body { 
            background-color: #27ae60; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0;
        }

        .form-container { 
            background-color: white; 
            padding: 30px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }

        h2 { 
            text-align: center; 
            text-transform: uppercase; 
            font-weight: bold; 
            margin-bottom: 25px; 
            color: #333; 
            font-size: 24px;
            border-bottom: 2px solid #27ae60;
            padding-bottom: 10px;

        }

        /* Group các ô nhập liệu */
        .form-group { margin-bottom: 15px; }

        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 5px; 
            font-size: 16px; 
            color: #444; 
        }

        input[type="text"], 
        input[type="number"], 
        select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px;
            outline: none;
        }

        input:focus { border-color: #5bb1f9; box-shadow: 0 0 5px rgba(91,177,249,0.3); }

        /* Radio buttons */
        .radio-group { display: flex; gap: 20px; padding: 10px 0; }
        .radio-item { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .radio-item input:checked + span {
            color: #007bff;
            font-weight: bold;
        }
        /* Khu vực nút bấm */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .row-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-submit {
            width: 100%;
            background-color: #007bff;
            color: white;
            padding: 15px;
            font-size: 16px;
        }

        .btn-submit:hover { background-color: #0056b3; transform: translateY(-1px); }

        .btn-reset {
            flex: 1;
            background-color: #dc3545;
            color: white;
            padding: 12px;
        }

        .btn-reset:hover { background-color: #a71d2a; }

        .btn-back {
            flex: 1;
            background-color: #6c757d;
            color: white;
            padding: 12px;
        }

        .btn-back:hover { background-color: #545b62; }

        button:disabled {
            background-color: #ccc !important;
            cursor: not-allowed;
            transform: none !important;
        }
    /* Ẩn mặc định ô nguyên nhân lỗi */
    .hidden {
        display: none;
    }
    </style>
</head>
<body>

<div class="form-container">
    <h2>LẤY MẪU BÁN THÀNH PHẨM</h2>
    
    <form id="tempForm">
        <!-- Người kiểm tra -->
        <div class="form-group">
            <label>NGƯỜI THỰC HIỆN</label>
            <div class="radio-group">
                <label class="radio-item">
                    <input type="radio" name="nguoiThucHien2" value="Công Bình" required> Công Bình
                </label>
                <label class="radio-item">
                    <input type="radio" name="nguoiThucHien2" value="Ngọc Dung"> Ngọc Dung
                </label>
                <label class="radio-item">
                    <input type="radio" name="nguoiThucHien2" value="Viết Tùy"> Viết Tùy
                </label>
                <label class="radio-item">
                    <input type="radio" name="nguoiThucHien2" value="Khánh Bình"> Khánh Bình
                </label>
            </div>
        </div>
        <!-- Chủng loại -->
        <div class="form-group">
            <label>CHỦNG LOẠI SẢN PHẨM</label>
            <select name="chungLoai" required>
                <option value="">-- Chọn chủng loại --</option>
                <option value="DT01P">DT01P</option>
                <option value="DT01P60">DT01P60</option>
                <option value="DT01P80">DT01P80</option>
                <option value="DT01M10">DT01M10</option>
                <option value="DT01M80">DT01M80</option>
                <option value="DT03P">DT03P</option>
                <option value="DT03P05">DT03P05</option>
                <option value="DT03M05">DT03M05</option>
                <option value="DT03M10">DT03M10</option>
                <option value="PQM3P">PQM3P</option>
                <option value="DCU 1P">DCU 1P</option>
                <option value="Router">Router</option>
                <option value="Repeater">Repeater</option>
                <option value="RMR">RMR</option>
                <option value="Elster-RF">Elster-RF</option>
                <option value="Multimeter-RF">Multimeter-RF</option>
                <option value="HHU-INCEU">HHU-INCEU</option>
            </select>
        </div>
        <!-- Công đoạn lấy mẫu -->
        <div class="form-group">
            <label>CÔNG ĐOẠN LẤY MẪU</label>
            <select name="congDoan" required>
                <option value="">-- Chọn công đoạn --</option>
                <option value="SMT, IMT">SMT, IMT</option>
                <option value="Hàn linh kiện">Hàn linh kiện</option>
                <option value="Lắp ráp">Lắp ráp</option>
                <option value="LT IDSX">LT IDSX</option>
                <option value="Hiệu chỉnh">Hiệu chỉnh</option>
                <option value="TNMT">TNMT</option>
                <option value="LT IDXX">LT IDXX</option>
                <option value="KĐ">Kiểm định</option>
                <option value="ĐG">Đóng gói</option>
            </select>
        </div>

        <!-- Số lượng mẫu kiểm tra -->
        <div class="form-group">
            <label>SỐ LƯỢNG MẪU KIỂM TRA</label>
            <input type="number" name="mauKiemTra" min="1" inputmode="numeric" required>
        </div>
        
        <!-- Số lượng mẫu Đạt -->
        <div class="form-group">
            <label>SỐ LƯỢNG MẪU ĐẠT</label>
            <input type="number" name="mauDat" min="0" inputmode="numeric" required>
        </div>
        
        <!-- Số lượng mẫu Không đạt -->
        <div class="form-group">
            <label>SỐ LƯỢNG MẪU KHÔNG ĐẠT</label>
            <input type="number" name="mauKhongDat" min="0" inputmode="numeric" placeholder="Nếu có...">
        </div>
        
        <!-- Nguyên nhân không đạt (Bọc trong div để ẩn/hiện) -->
        <div class="form-group hidden" id="nguyenNhanWrapper">
            <label>NGUYÊN NHÂN KHÔNG ĐẠT</label>
            <input type="text" name="nguyenNhan" id="nguyenNhanInput" placeholder="Nhập lý do cụ thể...">
        </div>

        <!-- Nhóm nút bấm -->
        <div class="button-stack">
            <!-- Nút gửi chính -->
            <button type="submit" id="submitBtn" class="btn-submit">GỬI DỮ LIỆU</button>
            
            <div class="row-buttons">
                <!-- Nút Xóa dữ liệu -->
                <button type="button" class="btn-reset" onclick="resetForm()">XÓA NHẬP LẠI</button>
                
                <!-- Nút Quay về -->
                <!-- Thay 'index.html' bằng file bạn muốn quay về -->
                <button type="button" class="btn-back" onclick="goToMenu()">QUAY VỀ MENU</button>
            </div>
        </div>
    </form>
</div>

<script src="script-lay-mau.js"></script>

    <script>
        const form = document.getElementById('tempForm');
        const btn = document.getElementById('submitBtn');

        // Xử lý sự kiện gửi form
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            btn.disabled = true;
            btn.innerText = "Đang gửi...";

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                // Gọi hàm từ file script.js đã tách
                await sendDataToGoogleSheet(data);
                
                alert("Gửi dữ liệu thành công!");
                form.reset();
            } catch (error) {
                console.error('Lỗi:', error);
                alert("Lỗi kết nối! Vui lòng thử lại.");
            } finally {
                btn.disabled = false;
                btn.innerText = "GỬI DỮ LIỆU";
            }
        });
    </script>
</body>
</html>
